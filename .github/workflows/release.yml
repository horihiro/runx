name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: runx
            asset_name: runx-linux-amd64
          - goos: linux
            goarch: arm64
            binary_name: runx
            asset_name: runx-linux-arm64
          - goos: darwin
            goarch: amd64
            binary_name: runx
            asset_name: runx-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary_name: runx
            asset_name: runx-darwin-arm64
          - goos: windows
            goarch: amd64
            binary_name: runx.exe
            asset_name: runx-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Resolve tag name
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.binary_name }} -ldflags="-s -w -X main.version=${{ steps.tag.outputs.name }}" main.go
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x ${{ matrix.binary_name }}
          fi

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.zip ${{ matrix.binary_name }} LICENSE README.md
            cp ${{ matrix.binary_name }} ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.exe
          else
            tar czf ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.tar.gz ${{ matrix.binary_name }} LICENSE README.md
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux binary artifact
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary-${{ matrix.goarch }}
          path: ${{ matrix.binary_name }}
          retention-days: 1

  build-deb:
    name: Build DEB (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve tag name
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary-${{ matrix.goarch }}

      - name: Build .deb
        env:
          PACKAGE_NAME: runx
          PLATFORM: linux
          RUNX_VERSION: ${{ steps.tag.outputs.name }}
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          SECTION: utils
          PRIORITY: optional
          MAINTAINER: horihiro
          DESCRIPTION: Environment-aware command proxy manager
          HOMEPAGE: https://github.com/horihiro/runx
          LICENSE: MIT
          BINARY_NAME: runx
        run: |
          mkdir -p dist .nfpm
          cp runx dist/runx
          chmod +x dist/runx

          cat > .nfpm/.nfpm.yaml <<EOF
          name: ${PACKAGE_NAME}
          arch: ${NFPM_ARCH}
          platform: ${PLATFORM}
          version: ${RUNX_VERSION}
          section: ${SECTION}
          priority: ${PRIORITY}
          maintainer: ${MAINTAINER}
          description: ${DESCRIPTION}
          homepage: ${HOMEPAGE}
          license: ${LICENSE}

          contents:
            - src: ./dist/${BINARY_NAME}
              dst: /usr/bin/${BINARY_NAME}
              file_info:
                mode: 0755
          EOF

          nfpm package --config .nfpm/.nfpm.yaml --packager deb --target "runx_${RUNX_VERSION#v}_${NFPM_ARCH}.deb"

      - name: Upload DEB to Release
        uses: softprops/action-gh-release@v1
        with:
          files: runx_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-winget-manifest:
    name: Update winget manifest
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve tag and version
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows release executable
        run: |
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/runx-windows-amd64-${{ steps.version.outputs.tag }}.exe"
          curl -L -o runx-windows.exe "$ASSET_URL"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA256=$(sha256sum runx-windows.exe | awk '{print $1}')
          echo "hash=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Windows exe SHA256: $SHA256"

      - name: Update winget manifest
        run: |
          MANIFEST_DIR=".winget"
          VERSION_FILE="$MANIFEST_DIR/horihiro.runx.yaml"
          INSTALLER_FILE="$MANIFEST_DIR/horihiro.runx.installer.yaml"
          LOCALE_FILE="$MANIFEST_DIR/horihiro.runx.locale.en-US.yaml"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.hash }}"
          REPO="${{ github.repository }}"

          # Update version manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$VERSION_FILE"

          # Keep manifest URLs aligned with current repository
          sed -i "s|https://github.com/[^/]*/[^/]*|https://github.com/$REPO|g" "$INSTALLER_FILE"
          sed -i "s|https://github.com/[^/]*/[^/]*|https://github.com/$REPO|g" "$LOCALE_FILE"

          # Update installer manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$INSTALLER_FILE"
          sed -i "s|^    InstallerUrl:.*|    InstallerUrl: https://github.com/$REPO/releases/download/$TAG/runx-windows-amd64-$TAG.exe|" "$INSTALLER_FILE"
          sed -i "s/InstallerSha256:.*/InstallerSha256: $SHA256/" "$INSTALLER_FILE"

          # Update locale manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$LOCALE_FILE"
          sed -i "s|releases/tag/v[0-9.]*|releases/tag/$TAG|g" "$LOCALE_FILE"

      - name: Create manifest archive
        run: |
          zip -j runx-winget-manifest-${{ steps.version.outputs.tag }}.zip .winget/horihiro.runx.yaml .winget/horihiro.runx.installer.yaml .winget/horihiro.runx.locale.en-US.yaml
      - name: Upload updated manifest to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            runx-winget-manifest-${{ steps.version.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

