name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_name: runx
            asset_name: runx-linux-amd64
          - goos: linux
            goarch: arm64
            binary_name: runx
            asset_name: runx-linux-arm64
          - goos: darwin
            goarch: amd64
            binary_name: runx
            asset_name: runx-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary_name: runx
            asset_name: runx-darwin-arm64
          - goos: windows
            goarch: amd64
            binary_name: runx.exe
            asset_name: runx-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Resolve tag name
        id: tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o ${{ matrix.binary_name }} -ldflags="-s -w -X main.version=${{ steps.tag.outputs.name }}" main.go
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x ${{ matrix.binary_name }}
          fi

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.zip ${{ matrix.binary_name }} LICENSE README.md
          else
            tar czf ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.tar.gz ${{ matrix.binary_name }} LICENSE README.md
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}-${{ steps.tag.outputs.name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-winget-manifest:
    name: Update winget manifest
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve tag and version
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows release asset
        run: |
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/runx-windows-amd64-${{ steps.version.outputs.tag }}.zip"
          curl -L -o runx-windows.zip "$ASSET_URL"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA256=$(sha256sum runx-windows.zip | awk '{print $1}')
          echo "hash=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Windows zip SHA256: $SHA256"

      - name: Update winget manifest
        run: |
          MANIFEST_DIR=".winget"
          VERSION_FILE="$MANIFEST_DIR/horihiro.runx.yaml"
          INSTALLER_FILE="$MANIFEST_DIR/horihiro.runx.installer.yaml"
          LOCALE_FILE="$MANIFEST_DIR/horihiro.runx.locale.en-US.yaml"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.hash }}"
          REPO="${{ github.repository }}"

          # Update version manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$VERSION_FILE"

          # Keep manifest URLs aligned with current repository
          sed -i "s|https://github.com/[^/]*/[^/]*|https://github.com/$REPO|g" "$INSTALLER_FILE"
          sed -i "s|https://github.com/[^/]*/[^/]*|https://github.com/$REPO|g" "$LOCALE_FILE"

          # Update installer manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$INSTALLER_FILE"
          sed -i "s|releases/download/v[0-9.]*/|releases/download/$TAG/|g" "$INSTALLER_FILE"
          sed -i "s/runx-windows-amd64-v[0-9.]*.zip/runx-windows-amd64-$TAG.zip/g" "$INSTALLER_FILE"
          sed -i "s/InstallerSha256:.*/InstallerSha256: $SHA256/" "$INSTALLER_FILE"

          # Update locale manifest
          sed -i "s/^PackageVersion:.*/PackageVersion: $VERSION/" "$LOCALE_FILE"
          sed -i "s|releases/tag/v[0-9.]*|releases/tag/$TAG|g" "$LOCALE_FILE"

      - name: Create manifest archive
        run: |
          zip -j winget-manifest-${{ steps.version.outputs.tag }}.zip .winget/horihiro.runx.yaml .winget/horihiro.runx.installer.yaml .winget/horihiro.runx.locale.en-US.yaml
      - name: Upload updated manifest to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            winget-manifest-${{ steps.version.outputs.tag }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
